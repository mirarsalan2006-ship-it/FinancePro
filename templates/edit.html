<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction - Pro Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA;
            --bg-body: #F8FAFC; 
            --surface-rgb: 255, 255, 255;
            --text-main: #0F172A; --text-muted: #64748B; 
            --border: rgba(226, 232, 240, 0.8);
            --radius-lg: 16px; 
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        body.dark-mode {
            --bg-body: #020617; 
            --surface-rgb: 30, 41, 59;
            --text-main: #F8FAFC; --text-muted: #94A3B8; 
            --border: rgba(51, 65, 85, 0.8);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; position: relative; overflow: hidden;}
        
        /* Ambient Glow */
        .ambient-glow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; }
        .ambient-glow::before { content: ''; position: absolute; width: 50vw; height: 50vw; border-radius: 50%; filter: blur(90px); opacity: 0.5; top: -10%; left: 20%; background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%); }
        
        .edit-card { position: relative; z-index: 10; background: rgba(var(--surface-rgb), 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; border: 1px solid var(--border);}
        h2 { margin-bottom: 24px; font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        
        form { display: flex; flex-direction: column; gap: 16px; }
        label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: -8px;}
        select, input { background: rgba(var(--surface-rgb), 0.5); color: var(--text-main); border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s;}
        select:focus, input:focus { border-color: var(--primary); background: rgba(var(--surface-rgb), 1);}
        
        .btn-group { display: flex; gap: 12px; margin-top: 10px; }
        .btn { padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; flex: 1; border: none; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: rgba(var(--surface-rgb), 0.8); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="edit-card">
        <h2><i data-lucide="edit-3"></i> Edit Transaction</h2>
        <form method="POST">
            <label>Date</label>
            <input type="date" name="date" value="{{ transaction.date }}" required>
            
            <label>Type</label>
            <select name="type" required>
                <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
                <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
            </select>
            
            <label>Amount ({{ currency_symbol }})</label>
            <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required>
            
            <label>Category</label>
            <input type="text" name="category" value="{{ transaction.category }}" required>
            
            <label>Description</label>
            <input type="text" name="description" value="{{ transaction.description }}" required>
            
            <div class="btn-group">
                <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary"><i data-lucide="save" width="18"></i> Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
