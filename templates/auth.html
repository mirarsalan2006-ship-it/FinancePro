<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} - Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg-color: #F3F4F6; --surface: #FFFFFF; --text-main: #111827; --border: #E5E7EB; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-top: 0; color: var(--text-main); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .link { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 14px; }
        .flash { color: #EF4444; margin-bottom: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>{{ action }}</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">{{ action }}</button>
        </form>
        
        {% if action == 'Login' %}
            <a href="{{ url_for('register') }}" class="link">Don't have an account? Register here.</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="link">Already have an account? Login here.</a>
        {% endif %}
    </div>
</body>
</html>
